on:
  pull_request: {}
  push: {}

name: Continuous integration

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v2
        with:
          go-version: '^1.16'
      - name: go build
        run: |
          go build ./...
      - name: go install
        run: |
          GOBIN=$(pwd)/install go install ./...
      - name: go test
        run: |
          PATH=$PATH:$(pwd)/install go test -tags llama.runtime ./...
      - name: Check license headers
        run: |
          ./scripts/dev/check-license

  build-gcc-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push GCC 15.2.0 image
        uses: docker/build-push-action@v5
        with:
          context: images/gcc-focal/
          push: true
          tags: |
            ghcr.io/jiayuehua/llama-gcc:15.2.0
            ghcr.io/jiayuehua/llama-gcc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
